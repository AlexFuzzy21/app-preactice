<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="app.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
  <header>
    header
  </header>
  <main>
    <div class="content">
      <div id="home-page" class="page ">
        home
      </div>
      <div id="workout-page" class="page active">
        <h1>Workout</h1>
        <button class="wp-newworkout-button" id="blue-extruded-button" role="button">New workout</button>
      </div>
      <div id="profile-page" class="page">
        profile page
      </div>  
      <div id="history-page" class="page">
        history page
      </div>  
    </div>  
  </main>
  <footer>
    <div class="home-toolbar-container">
      <button id="home-button" class="TBbutton" onclick="showPage('home-page', 'home-button')">
        <img src="Assets/home-button.png">
        <span>Home</span>
      </button>
      <button id="workout-button" class="TBbutton active" onclick="showPage('workout-page', 'workout-button')">
        <img src="Assets/workout-button.png">
        <span>Workout</span>
      </button>
      <button id="profile-button" class="TBbutton" onclick="showPage('profile-page', 'profile-button')">
        <img src="Assets/profile-button.png">
        <span>Profile</span>
      </button>
      <button id="history-button" class="TBbutton" onclick="showPage('history-page', 'history-button')">
        <img src="Assets/home-button.png">
        <span>History</span>
      </button>
    </div>
  </footer>
  <div id="workout-sheet" class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-content">
        <h2>New Workout</h2>
        <p>Put your workout form here</p>
      </div>
  </div>
    <div class="loader-wrapper">
      <div class="loader-box">
        <div class="loader"></div>
      </div>
    </div>
  </body>
</html>
